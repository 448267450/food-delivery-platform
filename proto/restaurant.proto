syntax = "proto3";

package restaurant;

option go_package = "github.com/448267450/food-delivery-platform/proto";

// ==================== Messages ====================

message GetRestaurantRequest {
  uint32 id = 1;
}

message GetRestaurantResponse {
  uint32 id          = 1;
  uint32 owner_id    = 2;
  string name        = 3;
  string description = 4;
  string address     = 5;
  string phone       = 6;
  bool   is_open     = 7;
}

message GetMenuItemRequest {
  uint32 id = 1;
}

message GetMenuItemResponse {
  uint32 id            = 1;
  uint32 restaurant_id = 2;
  string name          = 3;
  double price         = 4;
  string category      = 5;
  bool   is_available  = 6;
}

message ValidateMenuItemsRequest {
  repeated uint32 menu_item_ids = 1;
  uint32          restaurant_id = 2;
}

message MenuItemInfo {
  uint32 id           = 1;
  string name         = 2;
  double price        = 3;
  bool   is_available = 4;
}

message ValidateMenuItemsResponse {
  bool                  valid = 1;
  string                error = 2;
  repeated MenuItemInfo items = 3;
}

// ==================== Service ====================

service RestaurantService {
  rpc GetRestaurant(GetRestaurantRequest) returns (GetRestaurantResponse);
  rpc GetMenuItem(GetMenuItemRequest) returns (GetMenuItemResponse);
  rpc ValidateMenuItems(ValidateMenuItemsRequest) returns (ValidateMenuItemsResponse);
}